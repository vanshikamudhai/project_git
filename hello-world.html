<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #b7c0d8;
      --accent: #6ee7b7;
      --accent-2: #f9a8d4;
      --panel: rgba(15, 23, 42, 0.72);
      --line: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 22% 18%, rgba(110, 231, 183, 0.24), transparent 30%),
        radial-gradient(circle at 78% 76%, rgba(249, 168, 212, 0.24), transparent 32%),
        linear-gradient(135deg, #101827 0%, #1e1b4b 47%, #312e81 100%);
    }

    .stage {
      width: min(92vw, 820px);
      padding: clamp(28px, 6vw, 72px);
      position: relative;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 42px;
    }

    .nav a,
    .button {
      min-height: 46px;
      padding: 0 18px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .nav a[aria-current="page"],
    .button.primary {
      color: #07131f;
      border-color: transparent;
      background: linear-gradient(90deg, #6ee7b7, #fef08a);
    }

    .nav a:hover,
    .button:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    .sparkle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 28px var(--accent);
      animation: float 5s ease-in-out infinite;
    }

    .sparkle:nth-child(1) { left: 10%; top: 14%; }
    .sparkle:nth-child(2) { right: 11%; top: 20%; animation-delay: -1.4s; background: var(--accent-2); box-shadow: 0 0 28px var(--accent-2); }
    .sparkle:nth-child(3) { left: 18%; bottom: 16%; animation-delay: -2.8s; }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 12vw, 8.6rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .gradient-text {
      display: block;
      margin-top: 10px;
      color: transparent;
      background: linear-gradient(90deg, #6ee7b7, #fef08a, #f9a8d4);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .copy {
      width: min(100%, 580px);
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; }
      50% { transform: translateY(-18px) scale(1.35); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Fancy hello world greeting">
    <span class="sparkle" aria-hidden="true"></span>
    <span class="sparkle" aria-hidden="true"></span>
    <span class="sparkle" aria-hidden="true"></span>

    <nav class="nav" aria-label="Main navigation">
      <a href="hello-world.html" aria-current="page">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <p class="eyebrow">A tiny first page</p>
    <h1>Hello<span class="gradient-text">World</span></h1>
    <p class="copy">
      A polished little starter site with glassy depth, soft motion, and a bright friendly glow.
    </p>
    <div class="button-row" aria-label="Page links">
      <a class="button primary" href="about.html">Meet the page</a>
      <a class="button" href="contact.html">Say hello</a>
    </div>
  </main>
</body>
</html>
