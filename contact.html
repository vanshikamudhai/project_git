<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact us</title>
  <style>
    :root { color-scheme: dark; --ink: #f8fafc; --muted: #b7c0d8; --accent: #6ee7b7; --accent-2: #f9a8d4; --panel: rgba(15, 23, 42, 0.72); --line: rgba(255, 255, 255, 0.18); }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: radial-gradient(circle at 24% 76%, rgba(110, 231, 183, 0.24), transparent 30%), radial-gradient(circle at 82% 18%, rgba(249, 168, 212, 0.25), transparent 28%), linear-gradient(135deg, #101827 0%, #1e1b4b 47%, #312e81 100%); }
    .stage { width: min(92vw, 820px); padding: clamp(28px, 6vw, 72px); border: 1px solid var(--line); border-radius: 28px; background: var(--panel); box-shadow: 0 32px 90px rgba(0, 0, 0, 0.36); backdrop-filter: blur(22px); text-align: center; }
    .nav, .button-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .nav { margin-bottom: 42px; }
    .button-row { margin-top: 34px; gap: 14px; }
    .nav a, .button { min-height: 46px; padding: 0 18px; display: inline-grid; place-items: center; border: 1px solid var(--line); border-radius: 999px; color: var(--ink); background: rgba(255, 255, 255, 0.08); font-weight: 800; text-decoration: none; transition: transform 180ms ease, background 180ms ease, border-color 180ms ease; }
    .nav a[aria-current="page"], .button.primary { color: #07131f; border-color: transparent; background: linear-gradient(90deg, #6ee7b7, #fef08a); }
    .nav a:hover, .button:hover { transform: translateY(-3px); border-color: rgba(255, 255, 255, 0.42); background: rgba(255, 255, 255, 0.14); }
    .eyebrow { margin: 0 0 18px; color: var(--accent); font-size: 0.78rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(3.1rem, 10vw, 7.2rem); line-height: 0.95; letter-spacing: 0; text-wrap: balance; }
    .gradient-text { color: transparent; background: linear-gradient(90deg, #6ee7b7, #fef08a, #f9a8d4); -webkit-background-clip: text; background-clip: text; }
    .copy { width: min(100%, 600px); margin: 28px auto 0; color: var(--muted); font-size: clamp(1rem, 2.2vw, 1.2rem); line-height: 1.7; }
    .contact-line { margin-top: 18px; color: var(--ink); font-weight: 800; }
  </style>
</head>
<body>
  <main class="stage">
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <p class="eyebrow">Let us connect</p>
    <h1>Say <span class="gradient-text">hello</span></h1>
    <p class="copy">
      This contact page is ready for your details. Swap in your real email, social links, or a form whenever you want to grow the site.
    </p>
    <p class="contact-line">hello@example.com</p>
    <div class="button-row">
      <a class="button primary" href="mailto:hello@example.com">Send email</a>
      <a class="button" href="about.html">Read about</a>
    </div>
  </main>
</body>
</html>
